<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>validate-files — Syntax Validator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    header { width: 100%; padding: 16px 32px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { color: #b5f23d; }
    .badge { font-size: 11px; font-family: monospace; color: #b5f23d; border: 1px solid rgba(181,242,61,0.3); padding: 3px 12px; border-radius: 99px; }
    main { width: 100%; max-width: 920px; padding: 48px 24px; display: flex; flex-direction: column; align-items: center; gap: 28px; }
    .title-block { text-align: center; }
    .title-block h1 { font-size: clamp(26px, 4vw, 40px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 8px; }
    .title-block h1 span { color: #b5f23d; }
    .title-block p { font-size: 13px; color: #555; font-family: monospace; }
    .validator { width: 100%; background: #141414; border: 1px solid #2a2a2a; border-radius: 14px; overflow: hidden; }
    .toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #1e1e1e; background: #111; flex-wrap: wrap; }
    .toolbar label { font-size: 11px; color: #555; font-family: monospace; text-transform: uppercase; letter-spacing: 0.06em; }
    select { background: #1c1c1c; color: #e8e8e8; border: 1px solid #333; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-family: monospace; font-weight: 600; cursor: pointer; outline: none; }
    select:focus { border-color: #b5f23d; }
    .samples { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .chip { font-size: 11px; font-family: monospace; color: #555; border: 1px solid #2a2a2a; background: transparent; padding: 3px 11px; border-radius: 99px; cursor: pointer; transition: all 0.15s; }
    .chip:hover { color: #e8e8e8; border-color: #444; }
    .actions { display: flex; gap: 8px; margin-left: auto; }
    .btn-clear { background: transparent; color: #555; border: 1px solid #2a2a2a; padding: 6px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-clear:hover { color: #e8e8e8; border-color: #444; }
    .btn-validate { background: #b5f23d; color: #000; border: none; padding: 6px 22px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-validate:hover { background: #9fd62e; }
    .extra-actions { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #1e1e1e; background: #0f0f0f; flex-wrap: wrap; }
    .btn-extra { background: transparent; color: #666; border: 1px solid #2a2a2a; padding: 4px 14px; border-radius: 6px; font-size: 12px; font-family: monospace; cursor: pointer; transition: all 0.15s; }
    .btn-extra:hover { color: #e8e8e8; border-color: #444; }
    .editor-grid { display: grid; grid-template-columns: 1fr 1fr; min-height: 420px; }
    @media (max-width: 640px) { .editor-grid { grid-template-columns: 1fr; } }
    .pane { display: flex; flex-direction: column; }
    .pane-left { border-right: 1px solid #1e1e1e; }
    .pane-header { font-size: 10px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.1em; color: #444; padding: 7px 14px; border-bottom: 1px solid #1e1e1e; background: #111; display: flex; align-items: center; justify-content: space-between; }
    .code-area { position: relative; flex: 1; display: flex; background: #0d0d0d; }
    .gutter { width: 42px; min-width: 42px; padding: 14px 0; background: #111; border-right: 1px solid #1e1e1e; font-family: monospace; font-size: 12px; line-height: 22px; color: #333; text-align: right; overflow: hidden; user-select: none; }
    .gutter span { display: block; padding-right: 10px; }
    .gutter span.err-line { color: #ff5c5c; font-weight: 700; }
    .editor-wrap { position: relative; flex: 1; overflow: hidden; }
    .err-highlight { position: absolute; left: 0; right: 0; background: rgba(255,92,92,0.07); border-left: 2px solid #ff5c5c; height: 22px; pointer-events: none; z-index: 1; }
    textarea { position: absolute; inset: 0; background: transparent; border: none; outline: none; resize: none; color: #e8e8e8; font-family: monospace; font-size: 13px; line-height: 22px; padding: 14px; tab-size: 2; caret-color: #b5f23d; white-space: pre; overflow: auto; }
    textarea::placeholder { color: #2e2e2e; }
    .result-area { flex: 1; padding: 16px; overflow-y: auto; font-family: monospace; font-size: 13px; }
    .result-idle { height: 100%; display: flex; align-items: center; justify-content: center; color: #333; font-size: 12px; text-align: center; }
    .result-ok { background: rgba(66,224,138,0.08); border: 1px solid rgba(66,224,138,0.2); border-radius: 10px; padding: 12px 16px; color: #42e08a; font-size: 13px; margin-bottom: 12px; }
    .result-ok::before { content: "✓  "; }
    .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .meta-pill { font-size: 11px; font-family: monospace; color: #555; background: #1a1a1a; border: 1px solid #2a2a2a; padding: 3px 10px; border-radius: 99px; }
    .issue-count { font-size: 11px; color: #555; margin-bottom: 10px; }
    .issue { border: 1px solid rgba(255,92,92,0.2); background: rgba(255,92,92,0.06); border-radius: 9px; overflow: hidden; margin-bottom: 10px; }
    .issue-line { padding: 6px 12px; font-size: 11px; color: #ff5c5c; border-bottom: 1px solid rgba(255,92,92,0.15); font-weight: 600; }
    .issue-desc { padding: 9px 12px; font-size: 12px; color: #ccc; line-height: 1.6; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; display: inline-block; margin-right: 5px; }
    .dot.valid { background: #42e08a; box-shadow: 0 0 5px #42e08a; }
    .dot.invalid { background: #ff5c5c; box-shadow: 0 0 5px #ff5c5c; }
    .status-bar { padding: 10px 16px; border-top: 1px solid #1e1e1e; background: #0f0f0f; font-size: 12px; font-family: monospace; color: #444; min-height: 38px; }
    .status-bar.ok { color: #42e08a; }
    .status-bar.err { color: #ff5c5c; }
    footer { margin-top: auto; padding: 20px; font-size: 11px; font-family: monospace; color: #2a2a2a; text-align: center; }
  </style>
</head>
<body>
<header>
  <div class="logo">validate-<span>files</span></div>
  <div class="badge">Free · Works offline</div>
</header>
<main>
  <div class="title-block">
    <h1>Validate your files.<br><span>Instantly.</span></h1>
    <p>YAML · JSON · TOML · XML · INI · .env — instant local validation, line-by-line feedback</p>
  </div>
  <div class="validator">
    <div class="toolbar">
      <label>Language</label>
      <select id="lang" onchange="onLangChange()">
        <option value="yaml">YAML</option>
        <option value="json">JSON</option>
        <option value="toml">TOML</option>
        <option value="xml">XML</option>
        <option value="ini">INI</option>
        <option value="env">.env</option>
      </select>
      <div class="samples" id="samples"></div>
      <div class="actions">
        <button class="btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn-validate" onclick="validate()">Validate</button>
      </div>
    </div>
    <div class="extra-actions">
      <button class="btn-extra" onclick="formatCode()">Format / Prettify</button>
      <button class="btn-extra" onclick="minifyCode()">Minify</button>
      <button class="btn-extra" onclick="copyCode()">Copy</button>
    </div>
    <div class="editor-grid">
      <div class="pane pane-left">
        <div class="pane-header">Input</div>
        <div class="code-area">
          <div class="gutter" id="gutter"></div>
          <div class="editor-wrap" id="editorWrap">
            <textarea id="code" placeholder="Paste your code here..." oninput="onInput()" onscroll="syncScroll(this)"></textarea>
          </div>
        </div>
      </div>
      <div class="pane">
        <div class="pane-header">
          Result
          <span><span class="dot" id="dot"></span><span id="statusText" style="font-size:10px">Idle</span></span>
        </div>
        <div class="result-area" id="resultArea">
          <div class="result-idle">Paste code and click Validate</div>
        </div>
      </div>
    </div>
    <div class="status-bar" id="statusBar">Ready</div>
  </div>
</main>
<footer>Validates locally in your browser — no data sent anywhere</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script src="validators.js"></script>
<script src="app.js"></script>
</body>
</html>
